# fly.toml — Fly.io app configuration
# See https://fly.io/docs/reference/configuration/
#
# Fork users: change 'app' to your own Fly.io app name (run: fly apps create <name>)

app = 'finfolio'
primary_region = 'bom'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
